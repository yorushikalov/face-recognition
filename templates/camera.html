{% extends "base.html" %}
{% block title %}摄像头实时识别{% endblock %}
{% block head %}
<script defer src="{{ url_for('static', filename='js/camera.js') }}"></script>
{% endblock %}
{% block content %}
<div class="page-header">
    <h2>📷 摄像头实时识别</h2>
    <p>浏览器打开摄像头，逐帧发送到服务器识别</p>
</div>

<div class="camera-container">
    <div class="video-wrapper">
        <video id="video" width="640" height="480" autoplay playsinline></video>
        <canvas id="overlay" width="640" height="480"></canvas>
    </div>
    <div class="camera-info">
        <div id="result-display">
            <span class="result-label">检测结果：</span>
            <span id="result-text" class="result-text">等待中...</span>
        </div>
        <div id="fps-display">FPS: 0</div>
    </div>
    <div class="camera-controls">
        <button id="btn-start" class="btn btn-primary">▶ 启动摄像头</button>
        <button id="btn-stop" class="btn btn-secondary" disabled>⏹ 停止</button>
    </div>
</div>
{% endblock %}
